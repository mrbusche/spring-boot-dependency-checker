name: Publish on main via commit title

on:
  push:
    branches:
      - main

jobs:
  publish:
    name: Publish package to npm on main
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Determine semantic release type from commit title
        id: release
        run: |
          commit_title="${{ github.event.head_commit.message }}"
          echo "Commit title: $commit_title"
          release=patch
          if printf '%s' "$commit_title" | grep -Eq 'BREAKING[[:space:]]CHANGE|^.*!:'; then
            release=major
          elif printf '%s' "$commit_title" | grep -Eq '^(feat|feature)(:|\()'; then
            release=minor
          fi
          echo "release=$release" >> $GITHUB_OUTPUT

      - name: Bump package version
        run: npm version ${{ steps.release.outputs.release }} --no-git-tag-version

      - name: Run tests before publish
        run: npm test

      - name: Publish package to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
